[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["backend/tests"]
log_cli = true
log_cli_level = "WARNING"

[tool.black]
line-length = 100
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | venv
  | storage
  | __pycache__
)/
'''

[tool.isort]
profile = "black"
line_length = 100
