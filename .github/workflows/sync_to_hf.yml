name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          # This secret must be added to your GitHub Repo Settings
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://faais-k:$HF_TOKEN@huggingface.co/spaces/faais-k/ascent-interview-backend main
